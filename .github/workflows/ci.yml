name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '7.0.x', '8.0.x', '9.0.x']

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: |
        dotnet restore EnsureValidation/EnsureValidation.csproj
        dotnet restore EnsureValidation.Tests/EnsureValidation.Tests.csproj

    - name: Build
      run: |
        dotnet build EnsureValidation/EnsureValidation.csproj --no-restore --configuration Release
        dotnet build EnsureValidation.Tests/EnsureValidation.Tests.csproj --no-restore --configuration Release

    - name: Test
      run: dotnet test EnsureValidation.Tests/EnsureValidation.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
