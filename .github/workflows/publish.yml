name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: |
        dotnet restore EnsureValidation/EnsureValidation.csproj
        dotnet restore EnsureValidation.Tests/EnsureValidation.Tests.csproj

    - name: Build
      run: |
        dotnet build EnsureValidation/EnsureValidation.csproj --no-restore --configuration Release -f net9.0
        dotnet build EnsureValidation.Tests/EnsureValidation.Tests.csproj --no-restore --configuration Release -f net9.0

    - name: Test
      run: dotnet test EnsureValidation.Tests/EnsureValidation.Tests.csproj --no-build --configuration Release --verbosity normal -f net9.0

    - name: Pack
      run: dotnet pack EnsureValidation/EnsureValidation.csproj --configuration Release --no-build -p:PackageVersion=${{ github.event.release.tag_name }}

    - name: Push to NuGet
      run: dotnet nuget push "**/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
